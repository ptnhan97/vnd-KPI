<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Individual KPI Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #1e1b4b; /* Deep indigo background */
            background-image: radial-gradient(circle at 50% 50%, #312e81 0%, #1e1b4b 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* Dotted pattern overlay */
        .pattern-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(#6366f1 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.1;
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card-top {
            background: linear-gradient(135deg, #a855f7 0%, #8b5cf6 100%);
            border-radius: 24px 24px 0 0;
            padding: 40px 20px;
            text-align: center;
        }

        .logo-icon {
            background: rgba(255, 255, 255, 0.2);
            width: 64px;
            height: 64px;
            border-radius: 16px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .app-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .app-subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
        }

        .login-card-bottom {
            background-color: #1f2937;
            border-radius: 24px;
            padding: 40px 30px;
            margin-top: -24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #e5e7eb;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }

        .form-control {
            width: 100%;
            background-color: #374151;
            border: 1px solid #4b5563;
            border-radius: 12px;
            padding: 14px 16px 14px 44px;
            color: white;
            font-size: 14px;
            transition: all 0.2s;
            outline: none;
        }

        .form-control:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #a855f7 0%, #8b5cf6 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-submit:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
        }

        .divider {
            height: 1px;
            background-color: #374151;
            margin: 32px 0 24px 0;
        }

        .support-text {
            text-align: center;
            font-size: 13px;
            color: #9ca3af;
        }

        .support-email {
            color: #a855f7;
            text-decoration: none;
            font-weight: 500;
            display: block;
            margin-top: 4px;
        }

        .error-message {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body>
    <div class="pattern-overlay"></div>
    
    <div class="login-container">
        <div class="login-card-top">
            <div class="logo-icon">
                <i class="fa-solid fa-boxes-stacked"></i>
            </div>
            <h1 class="app-title">Individual KPI Tracker</h1>
            <p class="app-subtitle">Secure warehouse management system</p>
        </div>
        
        <div class="login-card-bottom">
            <div class="error-message" id="errorMessage">Invalid email or password</div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-group">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email" class="form-control" placeholder="your.email" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit" id="submitBtn">Sign In</button>
            </form>
            
            <div class="divider"></div>
            
            <div class="support-text">
                Need support? Contact
                <a href="mailto:nhan.phamtien@shopee.com" class="support-email">nhan.phamtien@shopee.com</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const emailInput = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const submitBtn = document.getElementById('submitBtn');
            
            let email = emailInput;
            if (!email.includes('@')) {
                email = email + '@shopee.com';
            }
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing In...';
            errorDiv.style.display = 'none';
            
            try {
                await auth.signInWithEmailAndPassword(email, password);
                // Redirect will be handled by onAuthStateChanged
            } catch (err) {
                errorDiv.textContent = 'Invalid email or password.';
                errorDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Sign In';
            }
        });

        auth.onAuthStateChanged((user) => {
            if (user) {
                // Fetch user role from Database
                db.ref('users/' + user.uid).once('value').then((snapshot) => {
                    const userData = snapshot.val();
                    if (userData) {
                        if (userData.is_active === false) {
                            auth.signOut();
                            const errorDiv = document.getElementById('errorMessage');
                            errorDiv.textContent = 'Account is blocked.';
                            errorDiv.style.display = 'block';
                            const submitBtn = document.getElementById('submitBtn');
                            submitBtn.disabled = false;
                            submitBtn.innerHTML = 'Sign In';
                            return;
                        }
                        localStorage.setItem('kpi_user', JSON.stringify({
                            email: user.email,
                            role: userData.role,
                            warehouses: userData.warehouses
                        }));
                        window.location.href = 'index.html';
                    } else {
                        // Default admin
                        if (user.email === 'nhan.phamtien@shopee.com') {
                            localStorage.setItem('kpi_user', JSON.stringify({
                                email: user.email,
                                role: 'owner',
                                warehouses: ['ALL']
                            }));
                            window.location.href = 'index.html';
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
